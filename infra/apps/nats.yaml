apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: default
  source:
    chart: nats
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    targetRevision: 1.2.11
    helm:
      values: |
        config:
          jetstream:
            enabled: true
        # We'll keep basic limits just for good practice, 
        # but OPA won't block us anymore if we miss one.
        container:
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
        natsBox:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: nats-io
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
