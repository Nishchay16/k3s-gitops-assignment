apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: default
  source:
    chart: nats
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    targetRevision: 1.2.11
    helm:
      values: |
        config:
          jetstream:
            enabled: true
        # For this chart version, resources go inside 'container'
        container:
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        # Sidecar Config Reloader
        reloader:
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
        # NATS Box deployment
        natsBox:
          enabled: true
          container:
            resources:
              limits:
                cpu: 100m
                memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: nats-io
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
