apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    chart: nats
    targetRevision: 1.2.11
    helm:
      parameters:
        - name: "resources.limits.cpu"
          value: "100m"
        - name: "resources.limits.memory"
          value: "128Mi"
        - name: "resources.requests.cpu"
          value: "50m"
        - name: "resources.requests.memory"
          value: "64Mi"
        - name: "natsBox.resources.limits.cpu"
          value: "100m"
        - name: "natsBox.resources.limits.memory"
          value: "128Mi"
        - name: "natsBox.resources.requests.cpu"
          value: "50m"
        - name: "natsBox.resources.requests.memory"
          value: "64Mi"
        - name: "reloader.resources.limits.cpu"
          value: "100m"
        - name: "reloader.resources.limits.memory"
          value: "128Mi"
        - name: "reloader.resources.requests.cpu"
          value: "50m"
        - name: "reloader.resources.requests.memory"
          value: "64Mi"
        - name: "natsBox.enabled"
          value: "true"
        - name: "jetstream.enabled"
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: nats-io
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
