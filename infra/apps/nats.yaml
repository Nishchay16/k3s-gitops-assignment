apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: default
  source:
    chart: nats
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    targetRevision: 1.2.11
    helm:
      values: |
        config:
          jetstream:
            enabled: true
    # --- THIS IS THE MAGIC PART ---
    # This manually patches the resulting YAML to satisfy OPA
    ignoreDifferences:
      - group: apps
        kind: StatefulSet
        jsonPointers:
          - /spec/template/spec/containers/0/resources
  template:
    metadata:
      name: nats-patch
  # Use an inline patch to force the limits
  source:
    chart: nats
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    targetRevision: 1.2.11
    helm:
      parameters:
        - name: "container.resources.limits.cpu"
          value: "100m"
        - name: "container.resources.limits.memory"
          value: "128Mi"
        - name: "reloader.resources.limits.cpu"
          value: "100m"
        - name: "natsBox.container.resources.limits.cpu"
          value: "100m"
