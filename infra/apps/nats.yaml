apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: default
  source:
    chart: nats
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    targetRevision: 1.2.11
    helm:
      values: |
        config:
          jetstream:
            enabled: true
        # Attempt 1: Standard server container
        container:
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
        # Attempt 2: nats-box deployment
        natsBox:
          container:
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
        # Attempt 3: The 'nats' key often used in 1.x charts
        nats:
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
        # Attempt 4: Sidecar reloader
        reloader:
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: nats-io
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Validate=false # CRITICAL: Tells Argo to stop complaining and just PUSH the YAML
