apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
  - 10.72.192.200-10.72.192.220
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
