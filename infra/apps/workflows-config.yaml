apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workflows-config
  namespace: argocd
spec:
  project: default
  source:
    path: infra/workflows
    repoURL: https://github.com/Nishchay16/k3s-gitops-assignment.git
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-workflows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
