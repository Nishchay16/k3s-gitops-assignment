apiVersion: v1
kind: Namespace
metadata:
  name: minio-system
---
# 1. MINIO SERVER (The actual storage)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "admin"
        - name: MINIO_ROOT_PASSWORD
          value: "password123"
        ports:
        - containerPort: 9000
        - containerPort: 9001
        resources:
          limits:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-system
spec:
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
  selector:
    app: minio
---
# 2. STORAGE CLASS (The Map)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: minio-csi-storage
provisioner: driver.minio.io
parameters:
  endpoint: http://minio.minio-system.svc.cluster.local:9000
  accessKey: admin
  secretKey: password123
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-csi-driver
  namespace: minio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-csi-driver
  template:
    metadata:
      labels:
        app: minio-csi-driver
    spec:
      containers:
      - name: csi-driver
        # Quay.io is the official stable source for Minio now
        image: quay.io/minio/operator:v5.0.7
        args:
        - "controller"
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio-system.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          value: "admin"
        - name: MINIO_SECRET_KEY
          value: "password123"
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: minio-csi-role
rules:
  - apiGroups: [""]
    resources: ["*"] # Broaden for the final fix
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["*"]
  - apiGroups: ["minio.min.io"] # Added this for the Tenant errors
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["sts.min.io"] # Added this for the PolicyBinding errors
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio-tenant
  namespace: minio-system
spec:
  image: minio/minio:latest
  pools:
    - servers: 1
      volumesPerServer: 1
      size: 1Gi
      storageClassName: local-path # This uses the underlying k3s storage
  mountpath: /export
  credsSecret:
    name: minio-creds-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds-secret
  namespace: minio-system
stringData:
  accesskey: "admin"
  secretkey: "password123"
