apiVersion: v1
kind: Namespace
metadata:
  name: minio-system
---
# 1. MINIO SERVER (The actual storage)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "admin"
        - name: MINIO_ROOT_PASSWORD
          value: "password123"
        ports:
        - containerPort: 9000
        - containerPort: 9001
        resources:
          limits:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-system
spec:
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
  selector:
    app: minio
---
# 2. STORAGE CLASS (The Map)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: minio-csi-storage
provisioner: driver.minio.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-csi-driver
  namespace: minio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-csi-driver
  template:
    metadata:
      labels:
        app: minio-csi-driver
    spec:
      containers:
      - name: csi-driver
        # Quay.io is the official stable source for Minio now
        image: quay.io/minio/operator:v5.0.7
        args:
        - "controller"
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio-system.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          value: "admin"
        - name: MINIO_SECRET_KEY
          value: "password123"
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
---
# 4. RBAC for Minio CSI Driver
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: minio-csi-role
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: minio-csi-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: minio-system
roleRef:
  kind: ClusterRole
  name: minio-csi-role
  apiGroup: rbac.authorization.k8s.io
