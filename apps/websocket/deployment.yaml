apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-app
  labels:
    app: websocket-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-app
  template:
    metadata:
      labels:
        app: websocket-app
    spec:
      containers:
      - name: websocket-app
        image: python:3.11-slim
        command: ["uvicorn", "ws_main:app", "--host", "0.0.0.0", "--port", "80"]
        workingDir: /app
        ports:
        - containerPort: 80
        volumeMounts:
        - name: ws-volume
          mountPath: /app
      volumes:
      - name: ws-volume
        configMap:
          name: websocket-config
