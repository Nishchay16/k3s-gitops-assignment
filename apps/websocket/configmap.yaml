apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-config
data:
  ws_main.py: |
    from fastapi import FastAPI, WebSocket

    app = FastAPI()

    @app.get("/")
    async def root():
        return {"message": "WebSocket app running"}

    @app.websocket("/ws")
    async def websocket_endpoint(ws: WebSocket):
        await ws.accept()
        await ws.send_text("Hello WebSocket!")
        await ws.close()
