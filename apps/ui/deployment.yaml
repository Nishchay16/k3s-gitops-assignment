apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui-app
  template:
    metadata:
      labels:
        app: ui-app
    spec:
      containers:
      - name: ui-app
        image: nginx:alpine
        volumeMounts:
        - name: ui-html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: ui-html
        configMap:
          name: ui-html
