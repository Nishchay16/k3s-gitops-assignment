<!DOCTYPE html>
<html>
<head>
  <title>UI Service</title>
  <script src="https://unpkg.com/nats.ws/nats.js"></script>
</head>
<body>
  <h1>UI Service</h1>
  <button onclick="sendTask()">Send Task to HTTP Service via NATS</button>

  <script>
    async function sendTask() {
      const nc = await NATS.connect({ servers: ["ws://nats:4222"] });
      const response = await nc.request("tasks", new TextEncoder().encode("Hello HTTP"));
      alert("Response from HTTP: " + new TextDecoder().decode(response.data));
      nc.close();
    }
  </script>
</body>
</html>
