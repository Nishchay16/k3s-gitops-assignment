apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-app
  template:
    metadata:
      labels:
        app: http-app
    spec:
      containers:
      - name: http-app
        image: python:3.11-slim
        command: ["python3", "-m", "http.server", "80"]
        ports:
        - containerPort: 80
